name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --extra agents

      - name: Run tests
        # integration tests are deselected (never collected) so CI never makes a live
        # LLM call even if DQ_AGENT_MODEL leaks into the environment; the Postgres test
        # still self-skips without DQ_TEST_POSTGRES_URI
        run: uv run pytest -m "not integration" --cov=src/dq_agent
